# GGG -> Gym env id (see repo README for naming pattern)
make_kwargs:
  base_name: "ClimbToTheBlock"
  id: "ClimbToTheBlock${instance_num}-v0"
  render: human # null | human | rgb_array (mapped to render_mode if supported)
  seed: 0
  max_episode_steps: 200

# provider tells the factory how to build
provider: ggg
env_id: ${...make_kwargs.id}
description: "Generalization Grid Games"
instance_num: 0
observation_mode: discrete
action_mode: discrete

expert:
  _target_: "programmatic_policy_learning.approaches.expert_approach.ExpertApproach"
  expert_fn:
    _target_: "programmatic_policy_learning.approaches.experts.grid_experts.get_grid_expert"
    env_name: ${...make_kwargs.id}
