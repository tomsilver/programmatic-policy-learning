# Expert policy for Motion2D using bilevel planning.
_target_: programmatic_policy_learning.approaches.kinder_bilevel_expert_approach.KinderBilevelExpertApproach
env_name: Motion2D
env_model_name: motion2d
model_kwargs:
  num_passages: ${env.num_passages}
max_abstract_plans: 10
samples_per_step: 3
max_skill_horizon: 100
heuristic_name: "hff"
planning_timeout: 60.0
