  - name: cap_enc5
    display_name: LLM imitation
    backend: cap
    cli_args:
      - --encodings
      - "5"
      - --model
      - gpt-4.1
      - --max-steps-per-traj
      - "40"

  - name: lpp_original
    display_name: LPP original (oracle)
    backend: lpp
    seeds: [0]
    feature_budget_override: approach.num_programs
    plot_style:
      linestyle: ":"
    overrides:
      - approach.program_generation.strategy=fixed_grid_v1
      - approach.program_generation_step_size=100

  - name: fcn
    display_name: FCN
    backend: fcn
    overrides:
      - approach.num_epochs=300
      - approach.batch_size=128
      - approach.learning_rate=0.001

  - name: vlm_imitation
    display_name: VLM imitation
    backend: vlm
    seeds: [0]
    model: gpt-4.1
