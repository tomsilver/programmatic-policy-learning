      - approach.collision_feedback_max_rounds=8
      - approach.program_generation.negative_sampling.enabled=true
      - approach.program_generation.negative_sampling.discrete.K=50
      - approach.program_generation.negative_sampling.discrete.ignore_equivalent_transitions=false
      - approach.program_generation.negative_sampling.discrete.use_sample_weights=false
