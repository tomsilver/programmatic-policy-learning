methods:

  - name: our_main_1
    display_name: Our approach 1
    backend: lpp
    sync_prompt_demo_subsets: true
    overrides:
      - approach.program_generation.strategy=py_feature_gen
      - approach.program_generation.encoding_method=enc_5
      - approach.map_choices=true
      - approach.collision_feedback_enabled=true
      - approach.collision_feedback_bucket_mode=global_mixed_label
      - approach.collision_feedback_max_rounds=8
      - approach.program_generation.negative_sampling.enabled=true
      - approach.program_generation.negative_sampling.discrete.ignore_equivalent_transitions=false
      - approach.program_generation.negative_sampling.discrete.use_sample_weights=false
      - approach.cross_demo_feature_filter.enabled=false
      - approach.cross_demo_feature_filter.apply_filter=false

  - name: our_main_2
    display_name: Our approach 2
    backend: lpp
    sync_prompt_demo_subsets: true
    overrides:
